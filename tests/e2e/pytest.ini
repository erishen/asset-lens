[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: 慢速测试，可通过 -m "not slow" 跳过
    e2e: 端到端测试
    api: API 测试
    ui: UI 测试

addopts = 
    -v
    --tb=short
    --strict-markers

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

log_cli = false
log_cli_level = INFO
