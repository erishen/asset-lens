[[tool.mypy.overrides]]
module = "asset_lens.data.market_index.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "asset_lens.data.exchange_rate_parser.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "asset_lens.core.sold_investment.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "asset_lens.core.portfolio_analytics.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "asset_lens.utils.logger.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "requests"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "httpx"
