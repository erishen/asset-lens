services:
  - type: web
    name: asset-lens-demo
    runtime: python
    repo: https://github.com/erishen/asset-lens
    plan: free
    buildCommand: pip install -U uv && uv sync --reinstall-package asset-lens --no-dev --no-cache && pip install uvicorn fastapi
    startCommand: uv run uvicorn asset_lens.web.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ASSET_LENS_DEMO_MODE
        value: "true"
      - key: ASSET_LENS_DATA_MODE
        value: sample
      - key: CORS_ORIGINS
        value: "*"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_URL
        value: https://langchain-llm-toolkit.onrender.com
