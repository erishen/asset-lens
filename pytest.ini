[pytest]
# pytest 配置文件

# 默认命令行选项
addopts = 
    -n auto
    --dist=loadfile
    --no-header
    --tb=short
    --ignore=tests/test_websocket.py
    --ignore=tests/test_scheduler.py
    --ignore=tests/test_scheduler_advanced.py
    --ignore=tests/test_http_client.py
    --ignore=tests/test_web_api.py
    --ignore=tests/test_multi_source_fetcher.py
    -W ignore::DeprecationWarning
    -W ignore::FutureWarning

# 测试路径
testpaths = tests

# 最小 Python 版本
minversion = 7.0

# 文件名模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    slow: 慢速测试
    network: 网络相关测试
    integration: 集成测试
    unit: 单元测试

# 日志配置
log_cli = false
log_cli_level = WARNING

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::PendingDeprecationWarning
