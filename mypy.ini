[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
ignore_missing_imports = True
show_error_codes = True
show_column_numbers = True
pretty = True

[mypy-tests.*]
ignore_errors = True

[mypy-asset_lens.data.stock_fetcher]
ignore_errors = False

[mypy-asset_lens.data.fund_fetcher]
ignore_errors = False

[mypy-asset_lens.core.market_sentiment]
ignore_errors = False

[mypy-asset_lens.utils.cli_utils]
ignore_errors = False

[mypy-asset_lens.utils.http_client]
ignore_errors = False

[mypy-asset_lens.web.api]
ignore_errors = False

[mypy-asset_lens.cli_modules.*]
ignore_errors = False

[mypy-asset_lens.core.irr_calculator]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-asset_lens.core.portfolio_analytics]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-asset_lens.data.models]
disallow_untyped_defs = True
disallow_incomplete_defs = True
