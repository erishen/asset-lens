[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
ignore_missing_imports = True
show_error_codes = True
show_column_numbers = True
pretty = True

[mypy-tests.*]
ignore_errors = True

