version: '3.8'

services:
  asset-lens:
    build:
      context: .
      dockerfile: Dockerfile
    image: asset-lens:latest
    container_name: asset-lens
    
    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
      - ASSET_LENS_ENV=production
      - TZ=Asia/Shanghai
    
    # 卷挂载
    volumes:
      - ./cache:/app/cache
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./config:/app/config
    
    # 端口映射（如果需要 Web 服务）
    ports:
      - "8000:8000"
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 重启策略
    restart: unless-stopped
    
    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-m", "asset_lens", "system", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 定时任务服务（可选）
  scheduler:
    image: asset-lens:latest
    container_name: asset-lens-scheduler
    
    environment:
      - PYTHONUNBUFFERED=1
      - ASSET_LENS_ENV=production
      - TZ=Asia/Shanghai
    
    volumes:
      - ./cache:/app/cache
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    
    # 定时任务：每天 15:30 更新数据
    command: >
      sh -c "
        while true; do
          echo 'Starting daily update at '$(date)
          python -m asset_lens data update-market-data --fast
          python -m asset_lens analyze portfolio
          python -m asset_lens report generate --type daily
          sleep 86400
        done
      "
    
    restart: unless-stopped
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 网络配置
networks:
  default:
    name: asset-lens-network
